<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/avatar.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ログイン — ネネ ポートフォリオ</title>
    <script src="/auth.js"></script>
    <script>
      if (window.PortfolioAuth && window.PortfolioAuth.isAuthenticated()) {
        window.location.replace("/");
      }
    </script>
    <style>
      :root {
        --bg: #f4f6fb;
        --bg-elevated: #fff;
        --text: #0f172a;
        --text-soft: #475569;
        --text-muted: #94a3b8;
        --accent: #6366f1;
        --accent-hot: #4f46e5;
        --accent-soft: #6366f11f;
        --border: #0f172a14;
        --shadow-md: 0 8px 24px #0f172a14;
        --radius: 20px;
        --font: "Zen Maru Gothic", "M PLUS Rounded 1c", "Hiragino Maru Gothic ProN",
          "Yu Gothic UI", "Meiryo", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: var(--font);
        color: var(--text);
        background: var(--bg);
        background-image: radial-gradient(120% 80% at 100% -20%, #6366f126, transparent 50%),
          radial-gradient(80% 60% at 0 100%, #0d94881f, transparent 45%);
        background-attachment: fixed;
        letter-spacing: 0.02em;
        line-height: 1.75;
      }

      .login-card {
        width: min(100%, 400px);
        padding: 2rem 2rem 1.75rem;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-md);
      }

      .login-card h1 {
        margin: 0 0 0.35rem;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .login-card__subtitle {
        margin: 0 0 1.5rem;
        color: var(--text-soft);
        font-size: 0.9rem;
      }

      label {
        display: block;
        margin-bottom: 0.35rem;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-soft);
      }

      input {
        width: 100%;
        margin-bottom: 1rem;
        padding: 0.65rem 0.85rem;
        font: inherit;
        font-size: 0.95rem;
        color: var(--text);
        background: #f8fafc;
        border: 1px solid var(--border);
        border-radius: 12px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      input:focus {
        border-color: #6366f166;
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      button[type="submit"] {
        width: 100%;
        margin-top: 0.25rem;
        padding: 0.75rem 1rem;
        font: inherit;
        font-size: 0.95rem;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        background: var(--accent-hot);
        border: none;
        border-radius: 999px;
        transition: background 0.15s, transform 0.1s;
      }

      button[type="submit"]:hover {
        background: var(--accent);
      }

      button[type="submit"]:active {
        transform: scale(0.98);
      }

      .login-error {
        display: none;
        margin: 0 0 1rem;
        padding: 0.6rem 0.85rem;
        font-size: 0.85rem;
        color: #dc2626;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 12px;
      }

      .login-error.is-visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <h1>ログイン</h1>
      <p class="login-card__subtitle">ポートフォリオを表示するには認証が必要です。</p>
      <p id="login-error" class="login-error" role="alert">ユーザー名またはパスワードが正しくありません。</p>
      <form id="login-form" method="post" action="/" autocomplete="on" novalidate>
        <label for="username">ユーザー名</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          required
          autofocus
        />
        <label for="password">パスワード</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        />
        <button type="submit">ログイン</button>
      </form>
    </main>
    <script>
      (function () {
        var form = document.getElementById("login-form");
        var errorEl = document.getElementById("login-error");

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var username = document.getElementById("username").value.trim();
          var password = document.getElementById("password").value;

          if (window.PortfolioAuth.login(username, password)) {
            errorEl.classList.remove("is-visible");
            window.location.replace("/");
            return;
          }

          errorEl.classList.add("is-visible");
          document.getElementById("password").value = "";
          document.getElementById("password").focus();
        });
      })();
    </script>
  </body>
</html>
